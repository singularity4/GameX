<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>2K Pointillist Landscape</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #0a0a1a;
}
canvas {
    display: block;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height;
let scaleX = 1, scaleY = 1;

let particles = [];
let walker = { x: 0, y: 0, targetX: 0, targetY: 0 };
let animationId;
let isAnimating = true;
let time = 0;

const palettes = [
['#ff006e', '#8338ec', '#3a86ff', '#06ffa5', '#ffbe0b'],
['#ff006e', '#fb5607', '#ffbe0b', '#8338ec', '#3a86ff'],
['#06ffa5', '#00f5ff', '#0099ff', '#6600ff', '#ff00aa'],
['#ffbe0b', '#ff006e', '#8338ec', '#3a86ff', '#06ffa5'],
];

let currentPalette = palettes[0];

function resize() {
    // Logical simulation size (same art logic)
    width = window.innerWidth;
    height = window.innerHeight;

    // True 2K render buffer
    const RENDER_WIDTH = 2560;
    const RENDER_HEIGHT = 1440;

    canvas.width = RENDER_WIDTH;
    canvas.height = RENDER_HEIGHT;

    canvas.style.width = width + "px";
    canvas.style.height = height + "px";

    scaleX = RENDER_WIDTH / width;
    scaleY = RENDER_HEIGHT / height;
}

function getLandscapeHeight(x) {
    const scale1 = 0.003;
    const scale2 = 0.007;
    const scale3 = 0.015;

    let h = Math.sin(x * scale1 + time * 0.2) * 100 +
            Math.sin(x * scale2) * 50 +
            Math.sin(x * scale3) * 25;

    const valley = Math.abs(x - width / 2) / (width / 2);
    h -= valley * valley * 200;

    return height * 0.6 + h;
}

class Particle {
    constructor() { this.reset(); }

    reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * 3 + 1;
        this.baseSize = this.size;
        this.color = currentPalette[Math.floor(Math.random() * currentPalette.length)];
        this.alpha = Math.random() * 0.6 + 0.2;
        this.phase = Math.random() * Math.PI * 2;
    }

    update() {
        const landscapeY = getLandscapeHeight(this.x);

        if (this.y > landscapeY) {
            this.alpha = Math.min(0.8, this.alpha + 0.01);
        } else {
            this.alpha = Math.max(0.1, this.alpha - 0.005);
            this.alpha += Math.sin(time * 2 + this.phase) * 0.02;
        }

        this.x += Math.sin(time + this.phase) * 0.2;
        this.y += Math.cos(time * 0.5 + this.phase) * 0.1;
    }

    draw() {
        ctx.globalAlpha = Math.max(0, Math.min(1, this.alpha));
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function initParticles() {
    particles = [];
    const count = Math.floor((width * height) / 400);
    for (let i = 0; i < count; i++) {
        particles.push(new Particle());
    }
}

function drawWalker() {
    walker.targetX = width / 2 + Math.sin(time * 0.3) * (width * 0.3);
    walker.targetY = getLandscapeHeight(walker.targetX) - 30;

    walker.x += (walker.targetX - walker.x) * 0.05;
    walker.y += (walker.targetY - walker.y) * 0.05;

    ctx.globalAlpha = 1;
    ctx.fillStyle = '#ffffff';

    ctx.beginPath();
    ctx.arc(walker.x, walker.y - 25, 6, 0, Math.PI * 2);
    ctx.fill();
}

function animate() {
    if (!isAnimating) return;

    ctx.setTransform(scaleX, 0, 0, scaleY, 0, 0);

    ctx.globalAlpha = 0.1;
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, width, height);

    time += 0.016;

    particles.forEach(p => {
        p.update();
        p.draw();
    });

    drawWalker();

    animationId = requestAnimationFrame(animate);
}

resize();
initParticles();
animate();

// 2K Recording
let recorder;
let chunks = [];

function startRecording(durationMs = 10000) {
    chunks = [];
    const stream = canvas.captureStream(60);

    recorder = new MediaRecorder(stream, {
        mimeType: "video/webm",
        videoBitsPerSecond: 20000000
    });

    recorder.ondataavailable = e => {
        if (e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstop = () => {
        const blob = new Blob(chunks, { type: "video/webm" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "2k_landscape.webm";
        a.click();
    };

    recorder.start();
    setTimeout(() => recorder.stop(), durationMs);
}

// Auto record 10 seconds
startRecording(10000);

</script>
</body>
</html>
