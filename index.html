<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pointillist Landscape - 2K Export</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}
body {
    background: #0a0a1a;
    overflow: hidden;
    font-family: 'Courier New', monospace;
}
canvas {
    display: block;
    cursor: crosshair;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height;
let SCALE = 1;

let particles = [];
let walker = { x: 0, y: 0, targetX: 0, targetY: 0 };
let animationId;
let isAnimating = true;
let time = 0;

const palettes = [
    ['#ff006e', '#8338ec', '#3a86ff', '#06ffa5', '#ffbe0b'],
    ['#ff006e', '#fb5607', '#ffbe0b', '#8338ec', '#3a86ff'],
    ['#06ffa5', '#00f5ff', '#0099ff', '#6600ff', '#ff00aa'],
    ['#ffbe0b', '#ff006e', '#8338ec', '#3a86ff', '#06ffa5'],
];

let currentPalette = palettes[0];

function resize() {
    const displayWidth = window.innerWidth;
    const displayHeight = window.innerHeight;

    SCALE = 2560 / displayWidth;

    canvas.style.width = displayWidth + "px";
    canvas.style.height = displayHeight + "px";

    canvas.width = displayWidth * SCALE;
    canvas.height = displayHeight * SCALE;

    ctx.setTransform(SCALE, 0, 0, SCALE, 0, 0);

    width = displayWidth;
    height = displayHeight;
}

function getLandscapeHeight(x, y) {
    const scale1 = 0.003;
    const scale2 = 0.007;
    const scale3 = 0.015;

    let h = Math.sin(x * scale1 + time * 0.2) * 100 +
            Math.sin(x * scale2 + y * scale2 * 0.5) * 50 +
            Math.sin(x * scale3) * 25;

    const valley = Math.abs(x - width / 2) / (width / 2);
    h -= valley * valley * 200;

    return height * 0.6 + h;
}

class Particle {
    constructor() { this.reset(); }
    reset() {
        this.x = Math.random() * width;
        this.y = Math.random() * height;
        this.size = Math.random() * 3 + 1;
        this.baseSize = this.size;
        this.color = currentPalette[Math.floor(Math.random() * currentPalette.length)];
        this.alpha = Math.random() * 0.6 + 0.2;
        this.phase = Math.random() * Math.PI * 2;
    }
    update() {
        const landscapeY = getLandscapeHeight(this.x, this.y);

        if (this.y > landscapeY) {
            this.alpha = Math.min(0.8, this.alpha + 0.01);
            this.size = this.baseSize * (1 + Math.random());
        } else {
            this.alpha = Math.max(0.1, this.alpha - 0.005);
            this.size = this.baseSize * 0.5;
            this.alpha += Math.sin(time * 2 + this.phase) * 0.02;
        }

        this.x += Math.sin(time + this.phase) * 0.2;
        this.y += Math.cos(time * 0.5 + this.phase) * 0.1;
    }
    draw() {
        ctx.globalAlpha = Math.max(0, Math.min(1, this.alpha));
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function initParticles() {
    particles = [];
    const count = Math.floor((width * height) / 400);
    for (let i = 0; i < count; i++) {
        particles.push(new Particle());
    }
}

function drawWalker() {
    walker.targetX = width / 2 + Math.sin(time * 0.3) * (width * 0.3);
    const groundY = getLandscapeHeight(walker.targetX, 0);
    walker.targetY = groundY - 30;

    walker.x += (walker.targetX - walker.x) * 0.05;
    walker.y += (walker.targetY - walker.y) * 0.05;

    ctx.globalAlpha = 1;
    ctx.fillStyle = '#ffffff';

    const bounce = Math.abs(Math.sin(time * 3)) * 5;

    ctx.beginPath();
    ctx.arc(walker.x, walker.y - 25 + bounce, 6, 0, Math.PI * 2);
    ctx.fill();
}

function animate() {
    if (!isAnimating) return;

    ctx.globalAlpha = 0.1;
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, width, height);

    time += 1/60;

    particles.forEach(p => { p.update(); p.draw(); });
    drawWalker();

    animationId = requestAnimationFrame(animate);
}

window.addEventListener('resize', () => {
    resize();
    initParticles();
});

resize();
initParticles();
animate();

/* Automatic Exact-Length 2K Exports */

const durations = [10, 20, 30, 60];
let currentIndex = 0;

function recordNext() {
    if (currentIndex >= durations.length) return;

    const seconds = durations[currentIndex];
    const chunks = [];
    const stream = canvas.captureStream(60);

    const recorder = new MediaRecorder(stream, {
        mimeType: "video/webm",
        videoBitsPerSecond: 20000000
    });

    recorder.ondataavailable = e => {
        if (e.data.size > 0) chunks.push(e.data);
    };

    recorder.onstop = () => {
        const blob = new Blob(chunks, { type: "video/webm" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = `pointillist_${seconds}s_2K.webm`;
        a.click();

        URL.revokeObjectURL(url);
        stream.getTracks().forEach(track => track.stop());

        currentIndex++;
        setTimeout(recordNext, 1000);
    };

    recorder.start();
    setTimeout(() => recorder.stop(), seconds * 1000);
}

recordNext();

</script>
</body>
</html>
